<div style="max-width: 500px; margin: 40px auto; font-family: Arial, sans-serif; padding: 20px; border: 1px solid #ccc; border-radius: 10px; background-color: #fdfdfd;">
  <h2 style="text-align: center; color: #2c3e50;">Calculadora de IMC</h2>
  
  <form (ngSubmit)="calcularIMC()" #imcForm="ngForm">
    
    <div style="margin-bottom: 15px;">
      <label>Nombre (Mínimo 3 caracteres):</label><br>
      <input type="text" [(ngModel)]="usuario.nombre" name="nombre" required minlength="3" style="width: 100%; padding: 8px;">
    </div>

    <div style="margin-bottom: 15px;">
      <label>Correo Electrónico:</label><br>
      <input type="email" [(ngModel)]="usuario.correo" name="correo" required email style="width: 100%; padding: 8px;">
    </div>

    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
      <div style="width: 48%;">
        <label>Peso en kg (10 - 300):</label>
        <input type="number" [(ngModel)]="usuario.peso" name="peso" required min="10" max="300" style="width: 100%; padding: 8px;">
      </div>
      <div style="width: 48%;">
        <label>Altura en m (0.5 - 2.5):</label>
        <input type="number" [(ngModel)]="usuario.altura" name="altura" required min="0.5" max="2.5" step="0.01" style="width: 100%; padding: 8px;">
      </div>
    </div>

    <button type="submit" [disabled]="imcForm.invalid" 
            style="width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
      Calcular IMC
    </button>
  </form>

  <div *ngIf="resultadoImc" style="margin-top: 25px; padding: 15px; background-color: #e8f8f5; border-radius: 5px; border-left: 5px solid #27ae60;">
    <h3 style="margin-top: 0; color: #1e8449;">Resultados para {{ usuario.nombre }}</h3>
    <p><strong>Tu IMC es:</strong> {{ resultadoImc | number:'1.1-2' }}</p>
    <p><strong>Categoría:</strong> <span style="font-size: 1.1em; font-weight: bold;">{{ categoria }}</span></p>
  </div>
</div>
